<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="64" cy="64" r="60" fill="url(#grad)" opacity="0.15"/>
  <!-- Yin-Yang style -->
  <circle cx="64" cy="64" r="44" fill="none" stroke="url(#grad)" stroke-width="4"/>
  <!-- Stylized 道 / terminal cursor -->
  <path d="M44 52 L84 52 M64 52 L64 88 M48 72 L80 72" stroke="url(#grad)" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Dot accents -->
  <circle cx="44" cy="40" r="5" fill="#7c3aed"/>
  <circle cx="84" cy="40" r="5" fill="#ec4899"/>
